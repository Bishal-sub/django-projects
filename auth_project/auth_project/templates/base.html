<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Auth App{% endblock %}</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css">
</head>

<body class="bg-light">

<nav class="navbar navbar-light bg-white border-bottom">
  <div class="container">

    <a class="navbar-brand font-weight-bold" href="{% url 'home' %}">
      Auth System
    </a>

    <div>

      {% if user.is_authenticated %}

        <a href="{% url 'home' %}" class="btn btn-outline-primary btn-sm mr-2">
          Home
        </a>

        <form method="post" action="{% url 'logout' %}" class="d-inline">
          {% csrf_token %}
          <button class="btn btn-outline-danger btn-sm" type="submit">
            Logout
          </button>
        </form>

      {% else %}

        <a href="{% url 'login' %}" class="btn btn-outline-primary btn-sm mr-2">
          Login
        </a>

        <a href="{% url 'register' %}" class="btn btn-primary btn-sm">
          Register
        </a>

      {% endif %}

    </div>

  </div>
</nav>

<div class="container mt-4">
  {% block content %}{% endblock %}
</div>

</body>
</html>
