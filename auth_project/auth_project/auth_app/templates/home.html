{% extends "base.html" %}

{% block title %}Dashboard{% endblock title %}

{% block content %}

<div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">

  <div class="card border-0 shadow-sm text-center" style="max-width: 420px; width: 100%;">

    <div class="card-body p-4">

      
      <div class="mb-3">
        <div class="rounded-circle bg-success d-inline-flex justify-content-center align-items-center"
             style="width: 60px; height: 60px;">
          <span class="text-white font-weight-bold" style="font-size: 28px;">✓</span>
        </div>
      </div>

   
      <h4 class="font-weight-bold mb-2">Login Successful</h4>
      <p class="text-muted mb-4">You are now signed in to your account.</p>

      

    </div>

  </div>

</div>

{% endblock content %}
