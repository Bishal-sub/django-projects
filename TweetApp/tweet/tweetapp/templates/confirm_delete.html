{% extends "base.html" %}

{% block content %}

<div class="container mt-5 d-flex justify-content-center">
    <div class="card shadow-sm" style="max-width: 500px; width: 100%;">
        <div class="card-body text-center">
            <!-- Warning Icon -->
            <div class="mb-3">
                <span style="font-size: 50px; color: #dc3545;">🛑</span>
            </div>

            <!-- Confirmation Message -->
            <h3 class="card-title mb-3">Are you sure you want to delete this tweet?</h3>

            <!-- Tweet Preview -->
            <p class="card-text p-3 bg-light border rounded">{{ tweet.text }}</p>

            <!-- Action Buttons -->
            <form method="post" class="d-flex justify-content-center gap-3 mt-4">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger btn-lg">Yes, Delete</button>
                <a href="{% url 'tweet_list' %}" class="btn btn-secondary btn-lg">Cancel</a>
            </form>
        </div>
    </div>
</div>

{% endblock content %}
