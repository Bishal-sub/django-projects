{% extends "base.html" %}

{% block content %}
 <a href="{% url 'tweet_list' %}" style="text-decoration: none;"> <- </a>
<h2 style="text-align:center; margin-top:40px;">
   
    {% if form.instance.pk %} Edit Tweet {% else %} Create Tweet {% endif %}
</h2>

<form action="" method="post" enctype="multipart/form-data" style="max-width:500px; margin:30px auto; display:flex; flex-direction:column; gap:15px;">
    {% csrf_token %}
    
    {{ form.as_p }}

    <button type="submit" style="padding:10px 20px; background-color:#0d6efd; color:white; border:none; border-radius:5px; cursor:pointer;">
        Submit
    </button>

    <a href="{% url 'tweet_list' %}" style="text-align:center; display:block; margin-top:10px; color:#6c757d; text-decoration:none;">
        Cancel
    </a>
</form>

{% endblock content %}
