<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Tweet App{% endblock title %}</title>

    <!-- Bootstrap 5 CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    {% block navbar %}
    <nav class="navbar navbar-expand-lg navbar-light bg-light shadow-sm">
      <div class="container">
        <a class="navbar-brand fw-bold" href="{% url 'tweet_list' %}">
  {% if request.resolver_match.url_name == 'tweet_list' %}
    TweetApp
  {% else %}
    Home
  {% endif %}
</a>

       
        

          <div class="d-flex align-items-center gap-2">
            {% if user.is_authenticated %}
              <form action="{% url 'logout' %}" method="post" class="mb-0">
                {% csrf_token %}
                <button type="submit" class="btn btn-outline-warning">
                  Logout
                </button>
              </form>
            {% else %}
              <a href="{% url 'register' %}" class="btn btn-outline-success">Register</a>
              <a href="{% url 'login' %}" class="btn btn-outline-primary">Login</a>
            {% endif %}
          </div>
        </div>
      </div>
    </nav>
    {% endblock navbar %}

    <main class="container mt-4">
      {% block content %}{% endblock content %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
