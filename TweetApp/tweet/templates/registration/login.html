{% extends "base.html" %}

{% block content %}
<div class="d-flex justify-content-center mt-5">
  <div class="col-md-6 col-lg-5">
    <h2 class="mb-4 text-center fw-bold">Login</h2>

    <form action="" method="post" class="p-4 border rounded shadow-sm bg-white">
      {% csrf_token %}
      {{ form.as_p }}

      <button type="submit" class="btn btn-primary w-100 py-2 mt-2">Login</button>
    </form>

    <p class="mt-3 text-center">
      If you don’t have an account, please 
      <a href="{% url 'register' %}" class="text-decoration-none">Register</a>
    </p>
  </div>
</div>
{% endblock content %}
